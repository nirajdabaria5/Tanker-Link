```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - TankerLink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:white;
}

.login-box{
width:100%;
max-width:450px;
background:#101010;
padding:45px;
border-radius:28px;
border:1px solid #1f1f1f;
}

.logo{
font-size:42px;
font-weight:700;
color:#00ff88;
text-align:center;
margin-bottom:15px;
}

.title{
text-align:center;
font-size:32px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#aaaaaa;
margin-bottom:35px;
line-height:1.7;
}

.input-group{
margin-bottom:22px;
}

.input-group label{
display:block;
margin-bottom:10px;
color:#cccccc;
font-size:15px;
}

.input-group input{
width:100%;
padding:16px;
background:#181818;
border:1px solid #2a2a2a;
border-radius:14px;
color:white;
font-size:16px;
outline:none;
}

.input-group input:focus{
border-color:#00ff88;
}

.login-btn{
width:100%;
padding:18px;
background:#00ff88;
border:none;
border-radius:14px;
font-size:18px;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.extra{
text-align:center;
margin-top:25px;
color:#999;
}

.extra a{
color:#00ff88;
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
TankerLink
</div>

<h1 class="title">
Welcome Back
</h1>

<p class="subtitle">
Login to manage loads, trips and tanker bookings.
</p>

<div class="input-group">
<label>Email Address</label>
<input type="email" id="email" placeholder="Enter your email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter your password">
</div>

<button type="button" class="login-btn" id="loginBtn">
Login
</button>

<div class="extra">
Don't have an account?
<a href="register.html">Register</a>
</div>

</div>

<script type="module">

import { auth } from "./firebase.js";

import {
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const loginBtn =
document.getElementById("loginBtn");

loginBtn.addEventListener("click", async () => {

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value;

if(!email || !password){
alert("Please enter email and password");
return;
}

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Successful");

window.location.replace("owner-dashboard.html");
}catch(error){

console.error(error);
alert(error.message);

}

});

</script>

</body>
</html>
```
