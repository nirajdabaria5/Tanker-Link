<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - TankerLink</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:white;
}

.register-box{
width:100%;
max-width:520px;
background:#101010;
padding:45px;
border-radius:28px;
border:1px solid #1f1f1f;
}

.logo{
font-size:42px;
font-weight:700;
color:#00ff88;
text-align:center;
margin-bottom:15px;
}

.title{
text-align:center;
font-size:34px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#aaaaaa;
margin-bottom:35px;
line-height:1.7;
}

.input-group{
margin-bottom:22px;
}

.input-group label{
display:block;
margin-bottom:10px;
color:#cccccc;
font-size:15px;
}

.input-group input,
.input-group select{
width:100%;
padding:16px;
background:#181818;
border:1px solid #2a2a2a;
border-radius:14px;
color:white;
font-size:16px;
outline:none;
transition:0.3s;
}

.input-group input:focus,
.input-group select:focus{
border-color:#00ff88;
}

.register-btn{
width:100%;
padding:18px;
background:#00ff88;
border:none;
border-radius:14px;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:0.3s ease;
margin-top:10px;
}

.register-btn:hover{
transform:translateY(-3px);
}

.extra{
text-align:center;
margin-top:25px;
color:#999;
}

.extra a{
color:#00ff88;
text-decoration:none;
}

</style>

</head>

<body>

<div class="register-box">

<div class="logo">
TankerLink
</div>

<h1 class="title">
Create Account
</h1>

<p class="subtitle">
Register as a tanker owner or transporter and start posting loads.
</p>

<form>

<div class="input-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your full name">
</div>

<div class="input-group">
<label>Mobile Number</label>
<input type="text" placeholder="Enter mobile number">
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" placeholder="Enter email address">
</div>

<div class="input-group">
<label>User Type</label>

<select>
<option>Select User Type</option>
<option>Tanker Owner</option>
<option>Transporter</option>
<option>Chemical Company</option>
</select>

</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Create password">
</div>

<button class="register-btn">
Create Account
</button>

</form>

<div class="extra">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

</body>
</html>
```
