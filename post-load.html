<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Post Load - TankerLink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
background:#0d0d0d;
border-bottom:1px solid #1f1f1f;
}

.logo{
font-size:34px;
font-weight:700;
color:#00ff88;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
}

.page{
padding:70px 8%;
display:flex;
justify-content:center;
}

.form-container{
width:100%;
max-width:1000px;
background:#101010;
padding:45px;
border-radius:28px;
border:1px solid #1f1f1f;
}

.form-title{
font-size:48px;
margin-bottom:15px;
}

.form-title span{
color:#00ff88;
}

.form-subtitle{
color:#bbbbbb;
margin-bottom:35px;
line-height:1.8;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.input-group{
display:flex;
flex-direction:column;
}

.input-group label{
margin-bottom:10px;
color:#cccccc;
}

.input-group input,
.input-group select,
textarea{
background:#181818;
border:1px solid #2a2a2a;
padding:16px;
border-radius:14px;
color:white;
font-size:16px;
}

textarea{
height:140px;
resize:none;
grid-column:span 2;
}

.freight-box{
background:#181818;
padding:18px;
border-radius:14px;
font-size:20px;
font-weight:600;
color:#00ff88;
}

.submit-btn{
margin-top:35px;
background:#00ff88;
color:black;
border:none;
padding:18px 35px;
font-size:18px;
font-weight:700;
border-radius:14px;
cursor:pointer;
}

footer{
padding:40px;
text-align:center;
color:#888;
}

@media(max-width:768px){

.form-grid{
grid-template-columns:1fr;
}

textarea{
grid-column:span 1;
}

nav{
display:none;
}

.form-title{
font-size:34px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">TankerLink</div>

<nav>
<a href="index.html">Home</a>
<a href="find-tanker.html">Find Tanker</a>
<a href="post-load.html">Post Load</a>
</nav>

</header>

<section class="page">

<div class="form-container">

<h1 class="form-title">
Post Your <span>Load</span>
</h1>

<p class="form-subtitle">
Create a load and connect with verified tanker owners across India.
</p>

<div class="form-grid">

<div class="input-group">
<label>Pickup Location</label>
<input type="text" id="pickup">
</div>

<div class="input-group">
<label>Destination</label>
<input type="text" id="destination">
</div>

<div class="input-group">
<label>Main Category</label>
<select id="mainCategory">
<option>Fuel</option>
<option>Chemical</option>
<option>Petrochemical</option>
<option>Edible Oil</option>
<option>Industrial Liquid</option>
<option>Other</option>
</select>
</div>

<div class="input-group">
<label>Material Type</label>
<select id="materialType">
<option>Methanol</option>
<option>Ethanol</option>
<option>Diesel</option>
<option>Petrol</option>
<option>ATF</option>
<option>Benzene</option>
<option>Toluene</option>
<option>Other</option>
</select>
</div>

<div class="input-group">
<label>Specify Material</label>
<input type="text" id="customMaterial">
</div>

<div class="input-group">
<label>Capacity Type</label>
<select id="capacityType">
<option>KL</option>
<option>MT</option>
</select>
</div>

<div class="input-group">
<label>Capacity</label>
<select id="capacity">
<option>20</option>
<option>25</option>
<option>30</option>
<option>35</option>
<option>40</option>
<option>45</option>
<option>50</option>
<option>Specify</option>
</select>
</div>

<div class="input-group">
<label>Specify Capacity</label>
<input type="text" id="customCapacity">
</div>

<div class="input-group">
<label>Rate (₹)</label>
<input type="number" id="rate">
</div>

<div class="input-group">
<label>Quantity</label>
<input type="number" id="qty">
</div>

<div class="input-group">
<label>Total Freight</label>
<div class="freight-box" id="freight">₹0</div>
</div>

<div class="input-group">
<label>Mobile Number</label>
<input type="text" id="mobile">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>Additional Details</label>
<textarea id="details"></textarea>
</div>

</div>

<button type="button" class="submit-btn" id="postLoadBtn">
Post Load
</button>

</div>

</section>

<footer>
TankerLink • India's Digital Tanker Marketplace
</footer>

<script type="module">

import { auth, db } from "./firebase.js";

import {
collection,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const rate = document.getElementById('rate');
const qty = document.getElementById('qty');
const freight = document.getElementById('freight');

function calculateFreight(){

const total =
(Number(rate.value || 0) * Number(qty.value || 0));

freight.innerText =
"₹" + total.toLocaleString();

}

rate.addEventListener('input', calculateFreight);
qty.addEventListener('input', calculateFreight);

document.getElementById("postLoadBtn")
.addEventListener("click", async () => {

try{

const totalFreight =
(Number(rate.value || 0) * Number(qty.value || 0));

await addDoc(collection(db,"loads"),{

pickup:
document.getElementById("pickup").value,

destination:
document.getElementById("destination").value,

mainCategory:
document.getElementById("mainCategory").value,

materialType:
document.getElementById("materialType").value,

customMaterial:
document.getElementById("customMaterial").value,

capacityType:
document.getElementById("capacityType").value,

capacity:
document.getElementById("capacity").value,

customCapacity:
document.getElementById("customCapacity").value,

rate:
Number(document.getElementById("rate").value),

quantity:
Number(document.getElementById("qty").value),

freight:
totalFreight,

mobile:
document.getElementById("mobile").value,

details:
document.getElementById("details").value,

createdAt:
serverTimestamp()

});

alert("Load Posted Successfully");

location.reload();

}catch(error){

console.error(error);
alert(error.message);

}

});

</script>

</body>
</html>
