<!DOCTYPE html>
<html>
<head>

<title>Post Load - TankerLink</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#050505;
color:white;
font-family:Arial;
padding:40px;
}

h1{
color:#00ff88;
font-size:50px;
margin-bottom:10px;
}

p{
color:#cccccc;
margin-bottom:40px;
}

.form-box{
background:#101010;
padding:40px;
border-radius:25px;
max-width:700px;
margin:auto;
border:1px solid #1f1f1f;
}

input, select{

width:100%;
padding:18px;
margin-bottom:20px;
border-radius:12px;
border:none;
background:#1a1a1a;
color:white;
font-size:16px;

}

button{

background:#00ff88;
color:black;
padding:18px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
width:100%;

}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<center>

<h1>Post Load</h1>

<p>
Create and publish tanker loads across India
</p>

</center>

<div class="form-box">

<input type="text" placeholder="Loading Point">

<input type="text" placeholder="Unloading Point">

<input type="text" placeholder="Material Name">

<input type="text" placeholder="Weight / Capacity">

<input type="text" placeholder="Freight Amount">

<select>
<option>Select Tanker Type</option>
<option>35KL SS Tanker</option>
<option>40KL Tanker</option>
<option>Fuel Tanker</option>
<option>Chemical Tanker</option>
</select>

<button>
Publish Load
</button>

</div>

</body>
</html>
