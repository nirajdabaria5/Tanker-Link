<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Post Load - TankerLink</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
background:#0d0d0d;
border-bottom:1px solid #1f1f1f;
}

.logo{
font-size:34px;
font-weight:700;
color:#00ff88;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:17px;
transition:0.3s;
}

nav a:hover{
color:#00ff88;
}

.page{
padding:70px 8%;
display:flex;
justify-content:center;
}

.form-container{
width:100%;
max-width:850px;
background:#101010;
padding:45px;
border-radius:28px;
border:1px solid #1f1f1f;
}

.form-title{
font-size:48px;
margin-bottom:15px;
font-weight:700;
}

.form-title span{
color:#00ff88;
}

.form-subtitle{
color:#bbbbbb;
margin-bottom:40px;
line-height:1.7;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.input-group{
display:flex;
flex-direction:column;
}

.input-group label{
margin-bottom:10px;
font-size:15px;
color:#cccccc;
}

.input-group input,
.input-group select,
textarea{
background:#181818;
border:1px solid #2a2a2a;
padding:16px;
border-radius:14px;
color:white;
font-size:16px;
outline:none;
transition:0.3s;
}

.input-group input:focus,
.input-group select:focus,
textarea:focus{
border-color:#00ff88;
}

textarea{
resize:none;
height:140px;
grid-column:span 2;
}

.submit-btn{
margin-top:35px;
background:#00ff88;
color:black;
border:none;
padding:18px 35px;
font-size:18px;
font-weight:700;
border-radius:14px;
cursor:pointer;
transition:0.3s ease;
}

.submit-btn:hover{
transform:translateY(-3px);
}

footer{
padding:40px 8%;
text-align:center;
color:#888;
margin-top:50px;
border-top:1px solid #1f1f1f;
}

@media(max-width:768px){

.form-grid{
grid-template-columns:1fr;
}

textarea{
grid-column:span 1;
}

.form-title{
font-size:36px;
}

nav{
display:none;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
TankerLink
</div>

<nav>
<a href="index.html">Home</a>
<a href="#">Features</a>
<a href="post-load.html">Post Load</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="page">

<div class="form-container">

<h1 class="form-title">
Post Your <span>Load</span>
</h1>

<p class="form-subtitle">
Fill the details below to connect with verified tanker owners and transporters across India.
</p>

<form>

<div class="form-grid">

<div class="input-group">
<label>Pickup Location</label>
<input type="text" placeholder="Enter pickup city">
</div>

<div class="input-group">
<label>Destination</label>
<input type="text" placeholder="Enter destination city">
</div>

<div class="input-group">
<label>Material Type</label>

<select>
<option>Select Material</option>
<option>Methanol</option>
<option>Solvent</option>
<option>Chemical</option>
<option>Fuel</option>
<option>Acid</option>
</select>

</div>

<div class="input-group">
<label>Tanker Capacity</label>

<select>
<option>Select Capacity</option>
<option>18 MT</option>
<option>24 MT</option>
<option>28 MT</option>
<option>30 MT</option>
</select>

</div>

<div class="input-group">
<label>Freight Amount</label>
<input type="text" placeholder="Enter freight amount">
</div>

<div class="input-group">
<label>Mobile Number</label>
<input type="text" placeholder="Enter mobile number">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>Additional Details</label>

<textarea placeholder="Enter load details, tanker requirements, timing etc."></textarea>

</div>

</div>

<button class="submit-btn">
Post Load
</button>

</form>

</div>

</section>

<footer>

<p>
TankerLink • India’s Digital Tanker Network
</p>

</footer>

</body>
</html>
