<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
}

header{
display:flex;

.logo{

}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
}

.page{
padding:70px 8%;

justify-content:center;
}

.form-container{
width:100%;

background:#101010;
padding:45px;

}

.form-title{
font-size:46px;

.form-title span{

}

}

}

</head>

</button>

</form>

</div>

</section>

TankerLink • India's Digital Tanker Marketplace
