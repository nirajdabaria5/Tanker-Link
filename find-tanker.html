<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Find Tanker - TankerLink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
background:#0d0d0d;
border-bottom:1px solid #1f1f1f;
}

.logo{
font-size:34px;
font-weight:700;
color:#00ff88;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
}

.page{
padding:60px 8%;
}

.page-title{
font-size:48px;
margin-bottom:10px;
}

.page-title span{
color:#00ff88;
}

.page-subtitle{
color:#aaa;
margin-bottom:40px;
}

.tankers-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.tanker-card{
background:#101010;
border:1px solid #1f1f1f;
border-radius:24px;
padding:25px;
}

.tanker-type{
font-size:28px;
font-weight:700;
color:#00ff88;
margin-bottom:15px;
}

.info{
margin-bottom:10px;
color:#ddd;
}

.mobile{
margin-top:15px;
font-size:18px;
}

.empty{
text-align:center;
padding:60px;
color:#888;
font-size:20px;
}

</style>

</head>

<body>

<header>

<div class="logo">TankerLink</div>

<nav>
<a href="index.html">Home</a>
<a href="post-load.html">Post Load</a>
<a href="post-tanker.html">Post Tanker</a>
<a href="available-loads.html">Available Loads</a>
</nav>

</header>

<section class="page">

<h1 class="page-title">
Available <span>Tankers</span>
</h1>

<p class="page-subtitle">
Live tankers posted by tanker owners across India.
</p>

<div id="tankersContainer" class="tankers-grid">

<div class="empty">
Loading tankers...
</div>

</div>

</section>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const tankersContainer =
document.getElementById("tankersContainer");

async function loadTankers(){

try{

const q = query(
collection(db,"tankers"),
orderBy("createdAt","desc")
);

const snapshot = await getDocs(q);

if(snapshot.empty){

tankersContainer.innerHTML =
'<div class="empty">No tankers available</div>';

return;
}

tankersContainer.innerHTML = "";

snapshot.forEach((doc)=>{

const data = doc.data();
  tankersContainer.innerHTML += `

<div class="tanker-card">

<div class="tanker-type">
${data.tankerType}
</div>

<div class="info">
Registration: ${data.registrationNumber}
</div>

<div class="info">
Route: ${data.currentLocation} → ${data.destination}
</div>

<div class="info">
Capacity: ${data.capacity} ${data.capacityType}
</div>

<div class="info">
Clean Tank: ${data.cleanTank}
</div>

<div class="info">
Wash Required: ${data.washRequired}
</div>

<div class="info">
Last Material: ${data.lastMaterial}
</div>

<div class="mobile">
📞 <a href="tel:${data.mobile}"
style="color:#00ff88;text-decoration:none;font-weight:600;">
${data.mobile}
</a>
</div>

</div>

`;

});

}catch(error){

console.error(error);

tankersContainer.innerHTML =
'<div class="empty">Error loading tankers</div>';

}

}

loadTankers();

</script>

</body>
</html>
